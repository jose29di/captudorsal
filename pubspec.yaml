name: captudorsal
description: "Sistema de control de tiempos y OCR para eventos deportivos"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  path_provider: ^2.1.5
  google_mlkit_text_recognition: ^0.14.0
  share_plus: ^10.1.4
  intl: ^0.20.2
  provider: ^6.1.2
  wakelock_plus: ^1.2.8
  permission_handler: ^11.3.1
  saver_gallery: ^4.1.2
  logger: ^2.5.0
  shared_preferences: ^2.3.4
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
